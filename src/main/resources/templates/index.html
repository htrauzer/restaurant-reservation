<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Reservation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Restaurant Reservation</title>
</head>
<body>
    <h1>Restaurant Tables</h1>
    
    <div class="main-dashboard">
        <div class="floor-plan-container">
            <div class="zone-box">
                <h3>Main Hall</h3>
                <div th:each="table : ${tables}" th:if="${table.zone == 'Main Hall'}"
                    class="table-div"
                    th:id="'table-' + ${table.id}"
                    th:data-slots="${table.bookedSlots}"
                    th:style="'left: ' + ${table.xCoordinate} + 'px; top: ' + ${table.yCoordinate} + 'px;'"
                    th:text="${table.seats}">
                </div>        
            </div>

            <div class="zone-box">
                <h3>Private Room</h3>
                <div th:each="table : ${tables}" th:if="${table.zone == 'Private Room'}"
                    class="table-div"
                    th:id="'table-' + ${table.id}"
                    th:data-slots="${table.bookedSlots}"
                    th:style="'left: ' + ${table.xCoordinate} + 'px; top: ' + ${table.yCoordinate} + 'px;'"
                    th:text="${table.seats}">
                </div>
            </div>

            <div class="zone-box">
                <h3>Terrace</h3>
                <div th:each="table : ${tables}" th:if="${table.zone == 'Terrace'}"
                    class="table-div"
                    th:id="'table-' + ${table.id}"
                    th:data-slots="${table.bookedSlots}"
                    th:style="'left: ' + ${table.xCoordinate} + 'px; top: ' + ${table.yCoordinate} + 'px;'"
                    th:text="${table.seats}">
                </div>
            </div>
        </div>

        <div class="vertical-time-bar">
            <h4>Select Time</h4>
            <div class="time-buttons-stack">
                <button th:each="hour : ${#numbers.sequence(12, 23)}" 
                        class="hour-btn"
                        th:attr="onclick=|filterByTime('${hour}')|">
                    <span th:text="${hour} + ':00'"></span>
                </button>
            </div>
        </div>
    </div>    
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
