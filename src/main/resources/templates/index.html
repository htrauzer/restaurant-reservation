<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Layout & Booking</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Restaurant Management System</h1>
    </header>

    <div class="filter-panel">
        <input type="number" id="guestCount" placeholder="Guests" min="1" value="2">
        <select id="zoneSelect">
            <option value="MAIN_HALL">Main Hall</option>
            <option value="PRIVATE_ROOMS">Private Rooms</option>
            <option value="TERRACE">Terrace</option>
        </select>
        <input type="date" id="bookingDate" value="2026-03-19">
        <select id="bookingTime">
            <option value="12">12:00</option>
            <option value="14">14:00</option>
            <option value="18">18:00</option>
            <option value="20">20:00</option>
        </select>
        <button onclick="filterTables()">Find Available</button>
    </div>

    <div class="restaurant-container">
        <div class="zones-sidebar">
            <div class="zone-box"><h2>Main Hall</h2></div>
            <div class="zone-box"><h2>Private Rooms</h2></div>
            <div class="zone-box"><h2>Terrace</h2></div>
        </div>

        <div class="service-area">
            <div class="kitchen-decor">KITCHEN / BAR</div>
        </div>

        <div th:each="table : ${tables}" 
             class="table-item" 
             th:classappend="|${table.zone} ${ (table.capacity == 2 || table.zone.name() == 'TERRACE') ? 'shape-round' : 'shape-square' }|"
             th:style="'left:' + ${table.posX} + '%; top:' + ${table.posY} + '%;'"
             th:data-id="${table.id}"
             onclick="openBooking(this)">
            <span th:text="${table.capacity}"></span>
        </div>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-body">
            <h3>Book Table #<span id="modalId"></span></h3>
            <input type="text" id="userName" placeholder="Your Name">
            <div class="modal-btns">
                <button onclick="confirmBooking()">Book</button>
                <button onclick="closeModal()">Exit</button>
            </div>
        </div>
    </div>

   <script th:src="@{/js/script.js}"></script>
</body>
</html>
