<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurant Reservation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Restaurant Layout</h1>
        <div class="meal-promo">
            <p th:text="${specialMeal}">Loading today's special...</p>
        </div>
    </header>

    <div id="restaurant-map">
        <div th:each="table : ${tables}" 
             class="table-item" 
             th:classappend="${table.zone.toString().toLowerCase()}"
             th:style="'left: ' + ${table.posX} + 'px; top: ' + ${table.posY} + 'px;'"
             th:title="'Seats: ' + ${table.capacity} + ' | Zone: ' + ${table.zone}">
            
            <span th:text="${table.capacity}"></span>
        </div>
    </div>

    <div class="legend">
        <span class="hall">Main Hall</span>
        <span class="private">Private Rooms</span>
        <span class="terrace">Terrace</span>
    </div>
    <div id="bookingModal" style="display:none; position:fixed; top:30%; left:40%; background:white; padding:20px; border:2px solid black; z-index:100;">
        <h3>Booking Table #<span id="modalTableId"></span></h3>
        <input type="text" id="customerName" placeholder="Your Name">
        <button onclick="submitBooking()">Confirm</button>
        <button onclick="document.getElementById('bookingModal').style.display='none'">Cancel</button>
    </div>
</body>
</html>
