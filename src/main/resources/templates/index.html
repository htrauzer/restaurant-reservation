<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurant Reservation</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <h1>Restaurant Layout</h1>
        <div class="meal-promo">
            <p th:text="${specialMeal}">Loading today's special...</p>
        </div>
    </header>

    <div class="filter-panel">
        <input type="number" id="guestCount" placeholder="Amount of Guests" min="1" value="2">
        <select id="zoneSelect">
            <option value="MAIN_HALL">Main Hall</option>
            <option value="TERRACE">Terrace</option>
            <option value="PRIVATE_ROOMS">Private Rooms</option>
        </select>
        <input type="date" id="bookingDate" value="2026-03-19">
        <select id="bookingTime">
            <option value="12">12:00</option>
            <option value="14">14:00</option>
            <option value="18">18:00</option>
            <option value="20">20:00</option>
        </select>
        <button onclick="filterTables()">Find Available Tables</button>
    </div>

    <div class="restaurant-container">
        <div class="zone-section main-hall">
            <h2>Main Hall</h2>
            <div class="wall"></div>
        </div>

        <div class="zone-section private-rooms">
            <h2>Private Rooms</h2>
            <div class="wall"></div>
        </div>

        <div class="zone-section terrace">
            <h2>Terrace</h2>
        </div>

        <div th:each="table : ${tables}" 
            class="table-item" 
            th:classappend="${table.zone}"
            th:style="'left:' + ${table.posX} + 'px; top:' + ${table.posY} + 'px;'"
            th:data-id="${table.id}">
            <span th:text="${table.capacity}"></span>
        </div>
    </div>

    <div class="legend">
        <span class="hall">Main Hall</span>
        <span class="private">Private Rooms</span>
        <span class="terrace">Terrace</span>
    </div>
    <div id="bookingModal" style="display:none; position:fixed; top:30%; left:40%; background:white; padding:20px; border:2px solid black; z-index:100;">
        <h3>Booking Table #<span id="modalTableId"></span></h3>
        <input type="text" id="customerName" placeholder="Your Name">
        <button onclick="submitBooking()">Confirm</button>
        <button onclick="document.getElementById('bookingModal').style.display='none'">Cancel</button>
    </div>
</body>
</html>
