<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurant Reservation</title>
</head>
<body>
    <h1>Restaurant Tables</h1>
    <table border="1">
        <tr>
            <th>Zone</th>
            <th>Seats</th>
            <th>Occupied</th>
        </tr>
        <tr th:each="table : ${tables}">
            <td th:text="${table.zone}"></td>
            <td th:text="${table.seats}"></td>
            <td th:text="${table.occupied}"></td>
        </tr>
    </table>
</body>
</html>
